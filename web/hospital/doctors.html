<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctors — Hospital Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout" id="doctors-page">
  <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><span class="material-icons">local_hospital</span></div>
      <div class="sidebar-logo-text">
        <h3 class="hospital-name">Hospital</h3><span>Admin Portal</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Main</div>
        <a class="nav-item" href="dashboard.html" data-page="dashboard.html"><span class="nav-icon material-icons">dashboard</span>Dashboard</a>
        <a class="nav-item active" href="doctors.html" data-page="doctors.html"><span class="nav-icon material-icons">medical_services</span>Doctors</a>
        <a class="nav-item" href="patients.html" data-page="patients.html"><span class="nav-icon material-icons">people</span>Patients</a>
        <a class="nav-item" href="appointments.html" data-page="appointments.html"><span class="nav-icon material-icons">event</span>Appointments</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">Account</div>
        <a class="nav-item" href="notifications.html" data-page="notifications.html">
          <span class="nav-icon material-icons">notifications</span>Notifications
          <span class="nav-badge" id="notif-nav-badge" style="display:none"></span>
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">H</div>
        <div class="sidebar-user-info"><strong class="hospital-name">Hospital</strong><span>Administrator</span></div>
        <button class="sidebar-signout material-icons" id="logout-btn" title="Sign out">logout</button>
      </div>
    </div>
  </aside>
  <div class="overlay"></div>

  <!-- ── Main ─────────────────────────────────────────────────────────── -->
  <main class="main-content">
    <header class="top-header">
      <button class="hamburger material-icons">menu</button>
      <div class="header-title"><h2>Doctors</h2><p>Manage doctor accounts and approvals</p></div>
      <div class="header-actions">
        <a href="notifications.html" class="notif-btn">
          <span class="material-icons">notifications</span>
          <span class="notif-dot" id="header-notif-dot" style="display:none"></span>
        </a>
      </div>
    </header>

    <div class="page-content">
      <!-- Search -->
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon material-icons">search</span>
          <input type="text" class="search-input" id="search-doctors" placeholder="Search doctors…" />
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="pending">Pending <span class="tab-count" id="count-pending">0</span></button>
        <button class="tab-btn" data-tab="approved">Approved <span class="tab-count" id="count-approved">0</span></button>
        <button class="tab-btn" data-tab="rejected">Rejected <span class="tab-count" id="count-rejected">0</span></button>
        <button class="tab-btn" data-tab="all">All Doctors <span class="tab-count" id="count-all">0</span></button>
      </div>

      <div class="tab-panel active" data-tab="pending">
        <div id="list-pending"><div class="loading-state"><div class="loading-spinner"></div></div></div>
      </div>
      <div class="tab-panel" data-tab="approved">
        <div id="list-approved"></div>
      </div>
      <div class="tab-panel" data-tab="rejected">
        <div id="list-rejected"></div>
      </div>
      <div class="tab-panel" data-tab="all">
        <div id="list-all"></div>
      </div>
    </div>
  </main>
</div>

<!-- ── Doctor detail modal ──────────────────────────────────────────────── -->
<div id="detail-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeDetailModal()">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3>Doctor Details</h3>
      <button class="modal-close material-icons" onclick="closeDetailModal()">close</button>
    </div>
    <div class="modal-body" id="detail-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline-danger btn-sm" id="modal-delete-btn">
        <span class="material-icons" style="font-size:16px">delete</span> Delete
      </button>
      <div style="flex:1"></div>
      <button class="btn btn-outline-danger btn-sm" id="modal-reject-btn">
        <span class="material-icons" style="font-size:16px">close</span> Reject
      </button>
      <button class="btn btn-success btn-sm" id="modal-approve-btn">
        <span class="material-icons" style="font-size:16px">check</span> Approve
      </button>
    </div>
  </div>
</div>

<script type="module" src="js/doctors.js"></script>
</body>
</html>
