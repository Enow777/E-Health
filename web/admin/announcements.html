<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcements — E-Health Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🛡️</div>
      <div><div class="sidebar-logo-text">E-Health Admin</div><div class="sidebar-logo-sub">Super Administrator</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Overview</div>
      <a href="dashboard.html"     class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <div class="nav-section-title">Management</div>
      <a href="hospitals.html"     class="nav-link"><span class="nav-icon">🏥</span> Hospitals</a>
      <a href="doctors.html"       class="nav-link"><span class="nav-icon">👨‍⚕️</span> Doctors</a>
      <a href="patients.html"      class="nav-link"><span class="nav-icon">🧑‍🤝‍🧑</span> Patients</a>
      <div class="nav-section-title">Communications</div>
      <a href="announcements.html" class="nav-link"><span class="nav-icon">📢</span> Announcements</a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-badge">
        <div class="admin-badge-icon">🛡️</div>
        <div><div class="admin-badge-label">Super Admin</div><div class="admin-badge-sub">Full Access</div></div>
      </div>
      <button class="btn btn-ghost btn-full" id="logout-btn" style="color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15)">Sign Out</button>
    </div>
  </aside>

  <div class="main">
    <header class="header">
      <div class="header-left">
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
        <span class="page-title">Announcements</span>
      </div>
    </header>
    <div class="content">
      <div class="grid-2">
        <!-- Compose -->
        <div class="card">
          <div class="card-header"><h3>New Announcement</h3></div>
          <div class="card-body">
            <form id="announce-form">
              <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" id="ann-title" class="form-control" placeholder="Announcement title" required />
              </div>
              <div class="form-group">
                <label class="form-label">Message</label>
                <textarea id="ann-message" class="form-control" rows="4" placeholder="Write your message here…" required style="resize:vertical"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Target Audience</label>
                <select id="ann-target" class="form-control">
                  <option value="all">Everyone</option>
                  <option value="doctors">Doctors only</option>
                  <option value="patients">Patients only</option>
                  <option value="hospitals">Hospitals only</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary btn-full">Send Announcement</button>
            </form>
          </div>
        </div>

        <!-- History -->
        <div>
          <h3 style="margin-bottom:16px">Past Announcements</h3>
          <div id="announcements-list">
            <div class="empty-state"><p>Loading…</p></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/announcements.js"></script>
</body>
</html>
